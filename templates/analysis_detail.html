<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ analysis_name }} | ProcessLens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}?v={{ static_version }}">
</head>
<body class="app-shell app-shell--detail" data-analysis-key="{{ analysis_key }}">
    <header class="top-header">
        <a href="/" class="top-logo">
            <div class="logo-mark">PL</div>
            <div class="logo-name">Process<span>Lens</span></div>
        </a>
        <div class="header-breadcrumb">
            <span>Home</span>
            <span class="sep">/</span>
            <span>Analysis</span>
            <span class="sep">/</span>
            <span class="current">{{ analysis_name }}</span>
        </div>
        <div class="header-right">
            <a href="/" class="hbtn">Dashboard</a>
            <a href="/analysis/pattern" class="hbtn">Pattern</a>
            <button id="detail-export-excel-button" type="button" class="hbtn primary">Excel Export</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">Menu</div>
                <a class="nav-item" href="/">
                    <div class="nav-dot blue">DB</div>
                    ダッシュボード
                </a>
                <a class="nav-item active" href="/analysis/{{ analysis_key }}">
                    <div class="nav-dot violet">DT</div>
                    詳細ビュー
                </a>
                <a class="nav-item" href="/">
                    <div class="nav-dot gray">BK</div>
                    TOPへ戻る
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">Analysis</div>
                <a class="nav-item{% if analysis_key == 'frequency' %} active{% endif %}" href="/analysis/frequency">
                    <div class="nav-dot blue">FR</div>
                    頻度分析
                </a>
                <a class="nav-item{% if analysis_key == 'transition' %} active{% endif %}" href="/analysis/transition">
                    <div class="nav-dot green">TR</div>
                    前後処理分析
                </a>
                <a class="nav-item{% if analysis_key == 'pattern' %} active{% endif %}" href="/analysis/pattern">
                    <div class="nav-dot violet">PT</div>
                    処理パターン
                </a>
            </div>
        </aside>

        <main class="app-main">
            <div class="page-shell page-shell--detail">
                <section class="detail-hero">
                    <div>
                        <p class="eyebrow">ProcessLens Detail</p>
                        <h1 id="detail-page-title">{{ analysis_name }}</h1>
                        <p id="detail-page-copy" class="hero-copy">分析条件適用後の詳細結果とドリルダウンを表示します。</p>
                    </div>
                    <div class="detail-hero-actions">
                        <a href="/" class="ghost-link">TOPへ戻る</a>
                    </div>
                </section>

                <section id="detail-status-panel" class="status-panel hidden"></section>
                <section id="detail-summary-panel" class="summary-panel hidden"></section>
                <section id="detail-chart-panel" class="result-panel hidden">
                    <div class="result-header">
                        <div>
                            <h2 id="detail-chart-title">チャート</h2>
                            <p id="detail-chart-note" class="result-meta"></p>
                        </div>
                    </div>
                    <div id="detail-chart" class="chart-frame"></div>
                </section>
                <section id="detail-result-panel" class="result-panel hidden"></section>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', path='/process_mining_shared.js') }}?v={{ static_version }}"></script>
    <script src="{{ url_for('static', path='/detail.js') }}?v={{ static_version }}"></script>
</body>
</html>
